<!DOCTYPE html>
<html>
<head>
    <title>Book AI Generator</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #f1f5f9;
        }

        .container {
            max-width: 900px;
            margin: 50px auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #38bdf8;
            margin-bottom: 10px;
        }

        p {
            text-align: center;
            color: #94a3b8;
        }

        .input-box {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 16px;
            background: #1e293b;
            color: white;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background: #38bdf8;
            color: #0f172a;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0ea5e9;
        }

        .card {
            margin-top: 30px;
            padding: 20px;
            border-radius: 12px;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        h2 {
            color: #22c55e;
        }

        .section {
            margin-bottom: 15px;
        }

        pre {
            white-space: pre-wrap;
            font-family: inherit;
            color: #e2e8f0;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>📘 Book AI Generator</h1>
    <p>Generate full AI-written stories instantly</p>

    <form method="post" action="/generate-book-ui">
        <div class="input-box">
            <input type="text" name="topic" placeholder="Enter your topic..." required>
            <button type="submit">Generate</button>
        </div>
    </form>

    {% if result %}
    <div class="card">

        <h2>Generated Book</h2>

        <div class="section">
            <strong>Idea:</strong>
            <pre>{{ result.idea }}</pre>
        </div>

        <div class="section">
            <strong>Outline:</strong>
            <pre>{{ result.outline }}</pre>
        </div>

        <div class="section">
            <strong>Content:</strong>
            <pre>{{ result.content }}</pre>
        </div>

        <div class="section">
            <strong>Summary:</strong>
            <pre>{{ result.summary }}</pre>
        </div>

    </div>
    {% endif %}

</div>

</body>
</html>
