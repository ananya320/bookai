<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book AI Generator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Roboto', sans-serif; }
        body { background: #f7f9fc; color: #333; padding: 20px; }
        header { text-align: center; margin-bottom: 30px; }
        header h1 { font-size: 2rem; color: #ffcc00; }
        header p { font-size: 1rem; color: #555; }

        form { max-width: 600px; margin: 0 auto 20px; display: flex; gap: 10px; }
        input[type="text"] { flex: 1; padding: 10px; font-size: 1rem; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; font-size: 1rem; border: none; border-radius: 5px; background: #ffcc00; color: #000; cursor: pointer; transition: 0.3s; }
        button:hover { background: #e6b800; }

        .output { max-width: 800px; margin: 20px auto; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .output h2 { margin-bottom: 10px; color: #ff9900; }
        .output pre { white-space: pre-wrap; word-wrap: break-word; font-size: 0.95rem; color: #222; }
    </style>
</head>
<body>

<header>
    <h1>Book AI Generator</h1>
    <p>Enter a topic and generate your AI-written book instantly!</p>
</header>

<main>
    <form id="bookForm">
        <input type="text" name="topic" id="topic" placeholder="Enter book topic..." required>
        <button type="submit">Generate Book</button>
    </form>

    <div id="result" class="output" style="display:none;">
        <h2>Generated Book:</h2>
        <pre id="bookContent"></pre>
    </div>
</main>

<script>
document.getElementById("bookForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const topic = document.getElementById("topic").value;
    const resultDiv = document.getElementById("result");
    const bookContent = document.getElementById("bookContent");

    bookContent.textContent = "Generating book... please wait!";
    resultDiv.style.display = "block";

    try {
        const response = await fetch(`/generate-book?topic=${encodeURIComponent(topic)}`);
        const data = await response.json();

        if (data.error) {
            bookContent.textContent = "Error: " + data.error;
        } else {
            let content = `Idea:\n${data.idea}\n\nOutline:\n${data.outline}\n\nContent:\n${data.content}\n\nSummary:\n${data.summary}`;
            bookContent.textContent = content;
        }

    } catch (err) {
        bookContent.textContent = "An error occurred: " + err.message;
    }
});
</script>

</body>
</html>
